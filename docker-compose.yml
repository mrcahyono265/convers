services:
  postgres:
    image: postgres:16-alpine
    container_name: convers-db
    environment:
      POSTGRES_DB: english_companion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shared-web-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: convers-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/english_companion
      JWT_SECRET: ${JWT_SECRET}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shared-web-network
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["migrate"]
    container_name: convers-migrate
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/english_companion
      NODE_ENV: production
    command: ["bun", "run", "src/database/migrate.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shared-web-network

volumes:
  postgres_data:

networks:
  shared-web-network:
    external: true
