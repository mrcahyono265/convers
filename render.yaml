services:
  - type: web
    name: english-companion
    env: bun
    buildCommand: "cd client && npm install && npm run build && cd ../server && bun install"
    startCommand: "cd server && bun run src/index.ts"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: "https://integrate.api.nvidia.com/v1"
      - key: CORS_ORIGIN
        sync: false
